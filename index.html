<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Product Explorer · AX-340</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter+Tight:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e1012; --bg2:#15181c; --panel:rgba(20,23,27,.9);
  --ink:#e8ebef; --dim:#9099a3; --faint:#5a636d;
  --line:rgba(232,235,239,.07); --line2:rgba(232,235,239,.14);
  --brand:oklch(0.78 0.10 75); --brand-s:oklch(0.78 0.10 75/.12); --brand-l:oklch(0.78 0.10 75/.45);
  --acc:oklch(0.72 0.04 220); --ok:oklch(0.72 0.11 150); --warn:oklch(0.78 0.14 65);
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --sans:'Inter Tight',-apple-system,system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}

/* stage */
#stage{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 65%,#1a1e24 0%,#0e1012 55%,#070909 100%)}
canvas{display:block;outline:none}

/* scan overlay — boot animation */
#scan{position:fixed;inset:0;pointer-events:none;z-index:4;opacity:0}
#scan.go{animation:scanAnim 2.8s ease-in-out forwards}
@keyframes scanAnim{
  0%{opacity:0;background:linear-gradient(to bottom,transparent 0%,transparent 0%,rgba(100,200,255,.08) 0%,rgba(100,200,255,.08) 2%,transparent 2%)}
  5%{opacity:1}
  50%{background:linear-gradient(to bottom,transparent 48%,rgba(100,200,255,.04) 49%,rgba(100,200,255,.18) 50%,rgba(100,200,255,.04) 51%,transparent 52%)}
  95%{opacity:1}
  100%{opacity:0;background:linear-gradient(to bottom,transparent 98%,rgba(100,200,255,.08) 98%,rgba(100,200,255,.08) 100%,transparent 100%)}
}
/* vignette */
#vignette{position:fixed;inset:0;pointer-events:none;z-index:2;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.55) 100%)}

/* loader */
#loader{position:fixed;inset:0;display:grid;place-items:center;background:var(--bg);z-index:100;transition:opacity .6s}
#loader.done{opacity:0;pointer-events:none}
.ld-inner{text-align:center;font-family:var(--mono)}
.ld-logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:20px}
.ld-logo svg{width:26px;height:26px}
.ld-logo span{font-size:16px;font-weight:600;letter-spacing:-.01em}
.ld-logo .sl{color:var(--brand)}
.ld-bar{width:220px;height:1px;background:var(--line2);margin:0 auto;overflow:hidden;position:relative}
.ld-bar::before{content:"";position:absolute;inset:0;background:var(--acc);transform:translateX(-100%);animation:ldSwipe 1.4s ease-in-out infinite}
@keyframes ldSwipe{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.ld-text{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-bottom:14px}
.ld-pct{color:var(--ink)}

/* appbar */
.appbar{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;padding:0 20px;background:#15181c;border-bottom:1px solid var(--line2);z-index:20;gap:18px}
.brand{display:flex;align-items:center;gap:10px;padding-right:18px;border-right:1px solid var(--line);height:100%}
.brand svg{width:22px;height:22px}
.brand-name{font-size:14px;font-weight:600;letter-spacing:-.01em}
.brand-name .sl{color:var(--brand);margin:0 1px}
.crumbs{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.02em;white-space:nowrap}
.crumbs .sep{color:var(--faint)}
.crumbs .here{color:var(--ink)}
.crumbs .rev{font-size:10px;padding:2px 6px;border:1px solid var(--line2);border-radius:2px;color:var(--dim);margin-left:3px}
.abr{margin-left:auto;display:flex;align-items:center;gap:5px}
.abtn{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);background:transparent;border:1px solid transparent;padding:6px 11px;cursor:pointer;border-radius:3px;display:flex;align-items:center;gap:6px;transition:color .12s,border-color .12s,background .12s}
.abtn:hover{color:var(--ink);border-color:var(--line2);background:rgba(255,255,255,.02)}
.abtn.pri{color:var(--ink);border-color:var(--line2);background:rgba(255,255,255,.03)}
.abtn svg{width:12px;height:12px;flex-shrink:0}
.divv{width:1px;height:20px;background:var(--line);margin:0 3px}
.fps{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.08em;padding:5px 8px;border-left:1px solid var(--line);margin-left:4px;min-width:52px}

/* context strip */
.ctx-strip{position:fixed;top:52px;left:0;right:0;height:36px;border-bottom:1px solid var(--line);background:rgba(14,16,18,.6);backdrop-filter:blur(14px);display:flex;align-items:center;padding:0 20px;gap:20px;z-index:15;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);white-space:nowrap;overflow:hidden}
.ctx-strip .cx{display:flex;align-items:center;gap:6px}
.ctx-strip .cx .k{color:var(--faint)}
.ctx-strip .cx .v{color:var(--ink)}
.ctx-strip .cx .v.br{color:var(--brand)}
/* live dot */
.ldot{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:ldpulse 2s ease-in-out infinite}
@keyframes ldpulse{0%,100%{opacity:1;box-shadow:0 0 0 0 var(--ok)}50%{opacity:.5;box-shadow:0 0 0 3px rgba(114,180,100,.0)}}

/* parts panel */
.pp{position:fixed;left:20px;top:108px;width:274px;max-height:calc(100vh - 200px);z-index:5;background:var(--panel);backdrop-filter:blur(20px);border:1px solid var(--line);border-radius:6px;padding:12px;display:flex;flex-direction:column}
.ph{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);padding:2px 2px 9px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);margin-bottom:6px}
.pl{display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.pr{display:flex;align-items:center;gap:9px;padding:8px 7px;border:1px solid transparent;cursor:pointer;transition:background .12s;font-size:12px;color:var(--dim);border-radius:3px;position:relative}
.pr:hover{color:var(--ink);background:rgba(255,255,255,.025)}
.pr.sel{color:var(--ink);background:rgba(255,255,255,.05);border-color:var(--line2)}
.pr.br-row.sel{background:rgba(198,154,90,.08);border-color:var(--brand-l)}
.pr .pi{font-family:var(--mono);font-size:9.5px;color:var(--faint);min-width:17px}
.pr .pn{flex:1;letter-spacing:-.005em}
.pr .pc{font-family:var(--mono);font-size:9px;color:var(--faint);background:rgba(255,255,255,.04);border:1px solid var(--line);padding:1px 5px;border-radius:2px}
.pr.br-row .pn::after{content:"ORIGINAL";display:inline-block;margin-left:8px;font-family:var(--mono);font-size:8px;letter-spacing:.12em;color:var(--brand);border:1px solid var(--brand-l);background:var(--brand-s);padding:1.5px 5px;border-radius:2px;vertical-align:1px;font-weight:500}
/* color swatch */
.pr .swatch{width:4px;height:24px;border-radius:2px;flex-shrink:0}

/* info panel */
.ip{position:fixed;top:108px;right:20px;bottom:96px;width:380px;background:var(--panel);backdrop-filter:blur(24px);border:1px solid var(--line);border-radius:6px;z-index:5;opacity:0;transform:translateX(10px);pointer-events:none;transition:opacity .22s,transform .22s;display:flex;flex-direction:column}
.ip.vis{opacity:1;pointer-events:auto;transform:translateX(0)}
.ip-head{padding:16px 18px 13px;border-bottom:1px solid var(--line);position:relative}
.ic{position:absolute;top:13px;right:13px;width:24px;height:24px;border:1px solid var(--line);background:transparent;color:var(--dim);cursor:pointer;font-family:var(--mono);font-size:13px;border-radius:3px;display:grid;place-items:center;transition:color .1s,border-color .1s}
.ic:hover{color:var(--ink);border-color:var(--line2);background:rgba(255,255,255,.03)}
.il{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:7px}
.it{font-size:20px;font-weight:500;letter-spacing:-.015em;margin-bottom:3px;line-height:1.15;padding-right:28px}
.is{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.04em}
.bbadge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--brand);padding:3px 8px;border:1px solid var(--brand-l);background:var(--brand-s);border-radius:2px;margin-bottom:12px}
/* status strip */
.ss{display:flex;border-bottom:1px solid var(--line)}
.sc{flex:1;padding:10px 13px;border-right:1px solid var(--line)}
.sc:last-child{border-right:none}
.sc .sk{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:3px}
.sc .sv{font-size:11.5px;color:var(--ink);font-weight:500;display:flex;align-items:center;gap:5px}
.dot{width:6px;height:6px;border-radius:50%}
.dok{background:var(--ok)}.dwn{background:var(--warn)}
/* tabs */
.tabs{display:flex;padding:0 13px;border-bottom:1px solid var(--line);gap:2px}
.tab{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);background:transparent;border:none;padding:10px 9px;cursor:pointer;border-bottom:1px solid transparent;margin-bottom:-1px;transition:color .1s}
.tab:hover{color:var(--dim)}
.tab.a{color:var(--ink);border-bottom-color:var(--ink)}
.ib{flex:1;overflow-y:auto;padding:16px 18px}
.idesc{font-size:12.5px;line-height:1.55;color:var(--dim);margin-bottom:14px;text-wrap:pretty}
/* sub parts */
.spl{display:flex;flex-direction:column;gap:2px}
.spr{display:flex;align-items:flex-start;gap:9px;padding:9px;border:1px solid var(--line);border-radius:3px;background:rgba(255,255,255,.015);cursor:pointer;transition:background .1s,border-color .1s}
.spr:hover{background:rgba(255,255,255,.03);border-color:var(--line2)}
.spn{font-family:var(--mono);font-size:9px;color:var(--faint);min-width:20px;padding-top:1px}
.spi{flex:1}
.spt{font-size:11.5px;color:var(--ink);font-weight:500;margin-bottom:2px}
.spm{font-family:var(--mono);font-size:9.5px;color:var(--faint);line-height:1.5}
.spp{font-family:var(--mono);font-size:9px;color:var(--acc);padding:2px 5px;border:1px solid rgba(100,180,200,.2);background:rgba(100,180,200,.06);border-radius:2px;white-space:nowrap;margin-top:1px;flex-shrink:0}
/* specs */
.specs{display:flex;flex-direction:column}
.sr{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(232,235,239,.045);font-size:11.5px}
.sr:last-child{border:none}
.sr .sk2{font-family:var(--mono);color:var(--faint);font-size:10px;text-transform:uppercase;letter-spacing:.04em}
.sr .sv2{font-family:var(--mono);color:var(--ink);font-size:10.5px;text-align:right}
.sr .sv2.ac{color:var(--brand);font-weight:500}
/* footer */
.if{padding:12px 14px;border-top:1px solid var(--line);display:flex;gap:7px}
.btn{flex:1;padding:9px 13px;border:1px solid var(--line2);background:transparent;color:var(--ink);font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:background .12s,border-color .12s}
.btn:hover{background:rgba(255,255,255,.03);border-color:var(--faint)}
.btn.pri{background:var(--ink);color:var(--bg);border-color:var(--ink);font-weight:500}
.btn.pri:hover{background:#fff;border-color:#fff}

/* bottom bar */
.bb{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:10;display:flex;align-items:stretch;border:1px solid var(--line);border-radius:6px;background:var(--panel);backdrop-filter:blur(20px);padding:4px;gap:1px}
.ctrl{background:transparent;border:none;color:var(--dim);font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:8px 13px;cursor:pointer;display:flex;align-items:center;gap:7px;border-radius:3px;transition:color .12s,background .12s;white-space:nowrap}
.ctrl:hover{color:var(--ink);background:rgba(255,255,255,.03)}
.ctrl.a{color:var(--ink);background:rgba(255,255,255,.055)}
.ctrl .kbd{font-size:8.5px;padding:2px 5px;border:1px solid var(--line2);color:var(--faint);border-radius:2px}
.cdiv{width:1px;background:var(--line);margin:4px 1px}
.sw{display:flex;align-items:center;gap:9px;padding:0 13px;min-width:190px}
.sw label{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:2px;background:var(--line2);outline:none;border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:9px;height:9px;background:var(--ink);border-radius:50%;cursor:pointer}
.sv{font-family:var(--mono);font-size:10px;color:var(--ink);min-width:32px;text-align:right}

/* hover tag */
.ht{position:fixed;pointer-events:none;z-index:8;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink);background:rgba(8,10,13,.88);border:1px solid var(--line2);padding:5px 9px;border-radius:2px;transform:translate(14px,-50%);opacity:0;transition:opacity .1s;white-space:nowrap}
.ht.vis{opacity:1}
.ht::before{content:"";position:absolute;left:-9px;top:50%;width:7px;height:1px;background:var(--acc)}

/* callouts */
.co{position:absolute;pointer-events:none;z-index:7;opacity:0;transition:opacity .5s;transform:translate(-50%,-100%);width:190px}
.co.on{opacity:1}
.co .cd{background:rgba(12,14,17,.96);border:1px solid var(--brand-l);border-radius:3px;padding:7px 10px;display:flex;align-items:center;gap:8px;white-space:nowrap}
.co .cn{width:17px;height:17px;border-radius:50%;border:1px solid var(--brand-l);background:var(--brand-s);color:var(--brand);font-family:var(--mono);font-size:8.5px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.co .ct{display:flex;flex-direction:column;line-height:1.1}
.co .ck{font-family:var(--mono);font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--brand);margin-bottom:2px}
.co .cv{font-size:11px;color:var(--ink);font-weight:500;letter-spacing:-.005em}
.co .cl{width:1px;height:36px;background:var(--brand-l);margin:0 auto}
.co .ctip{width:6px;height:6px;background:var(--brand);border-radius:50%;margin:0 auto;box-shadow:0 0 0 3px rgba(198,154,90,.18)}

/* part labels */
.plbl{position:absolute;pointer-events:none;font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--acc);text-transform:uppercase;transform:translate(-50%,-50%);white-space:nowrap}
.plbl::before{content:"";display:inline-block;width:5px;height:5px;border:1px solid var(--acc);margin-right:5px;vertical-align:middle;transform:rotate(45deg)}

/* scrollbars */
.pl::-webkit-scrollbar,.ib::-webkit-scrollbar{width:3px}
.pl::-webkit-scrollbar-track,.ib::-webkit-scrollbar-track{background:transparent}
.pl::-webkit-scrollbar-thumb,.ib::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}

@media(max-width:1100px){
  .hide-n{display:none!important}
  .pp{width:244px}
  .ip{width:330px}
}
</style>
</head>

<div id="loader">
  <div class="ld-inner">

      <svg viewBox="0 0 22 22" fill="none">
        <path d="M3 19 L11 3 L19 19" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" style="color:#e8ebef"/>

</div>

<!-- parts panel -->

</aside>

<!-- info panel -->
<aside class="ip" id="infopanel">
  <div class="ip-head">
    <button class="ic" id="iclose">×</button>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ─── Data ───────────────────────────────────────────────────────────────────
const SYSTEMS = {

function mat(hex,rough=0.4,metal=0.3,emit=null){
  const m = new THREE.MeshStandardMaterial({color:hex,roughness:rough,metalness:metal});
  if(emit){m.emissive.setHex(emit);m.emissiveIntensity=0.0;}
  return m;
}

function reg(grp,key,dir){
  grp.userData.partKey=key;
  grp.userData.homePos=grp.position.clone();
  grp.userData.explodeDir=dir.clone();
  grp.traverse(o=>{
    if(!o.isMesh)return;
    o.castShadow=true; o.receiveShadow=true;
    o.userData.partKey=key;
    // store original materials for highlight/isolate
    if(!o.userData.origMat) o.userData.origMat=o.material;
  });
  parts.push(grp);
  tractor.add(grp);
}

function buildTire(big){
  const g = new THREE.Group();
  const r = big?0.66:0.40, w = big?0.32:0.24;
  // tire carcass
  g.add(cyl(r,r,w,36,RUBBER, 0,0,0, Math.PI/2));
  // R-1 tread lugs (staggered)
  const nc = big?18:12;
  for(let i=0;i<nc;i++){
    const a=(i/nc)*Math.PI*2;
    const lug = box(0.07,0.1,w*0.78,RUBBER);
    lug.position.set(Math.cos(a)*r, Math.sin(a)*r, 0);
    lug.rotation.z=a+Math.PI/2; g.add(lug);
    // alternating offset lugs
    const a2=a+Math.PI/nc;
    const lug2=box(0.05,0.08,w*0.5,RUBBER);
    lug2.position.set(Math.cos(a2)*(r+0.005), Math.sin(a2)*(r+0.005), w*0.22*(i%2?1:-1));
    lug2.rotation.z=a2+Math.PI/2; g.add(lug2);
  }
  // hub casting
  g.add(cyl(r*0.46,r*0.46,w*1.05,22,DARK_METAL, 0,0,0, Math.PI/2));
  // spokes (6)
  for(let i=0;i<6;i++){
    const sa=(i/6)*Math.PI*2;
    const spoke=box(r*0.38,0.06,w*0.9,mat(0x252d34,0.5,0.6));
    spoke.rotation.x=Math.PI/2; spoke.rotation.y=0; spoke.rotation.z=sa;
    spoke.position.set(Math.cos(sa)*r*0.24, Math.sin(sa)*r*0.24, 0);
    g.add(spoke);
  }
  g.add(cyl(r*0.14,r*0.14,w*1.12,14,CHROME, 0,0,0, Math.PI/2));
  // bolts
  for(let i=0;i<8;i++){
    const ba=(i/8)*Math.PI*2;
    g.add(cyl(0.022,0.022,w*1.1,6,CHROME, Math.cos(ba)*r*0.3, Math.sin(ba)*r*0.3, 0, Math.PI/2));
  }
  return g;
}

// ─── Load real tractor GLB ───────────────────────────────────────────────────
const gltfLoader = new GLTFLoader();
let glbReady = false;

gltfLoader.load('./tractor.glb', gltf => {
  tractorMesh = gltf.scene;

  // GLB bounding box BEFORE transforms
  const bb0 = new THREE.Box3().setFromObject(tractorMesh);
  const sz0 = bb0.getSize(new THREE.Vector3());

  // Scale so the long axis (Z=15.49) fits ~3.5 units
  const sc = 3.5 / sz0.z;
  tractorMesh.scale.setScalar(sc);

  // Rotate so tractor faces +X (matches procedural layout)
  // GLB faces +Z (Blender default); rotate +90° around Y maps -Z→+X (front)
  tractorMesh.rotation.y = Math.PI / 2;

  // Compute world BB after scale+rotation, then center bottom at y=0
  tractorMesh.updateMatrixWorld(true);
  const bbW = new THREE.Box3().setFromObject(tractorMesh);
  const ctrW = bbW.getCenter(new THREE.Vector3());
  tractorMesh.position.set(-ctrW.x, -bbW.min.y, -ctrW.z);

  // Enhance for PBR lighting — keep textures, fix material params
  tractorMesh.traverse(o => {
    if(!o.isMesh) return;
    o.castShadow = true;
    o.receiveShadow = true;
    if(o.material && !Array.isArray(o.material)){
      if(o.material.isMeshStandardMaterial){
        o.material.roughness  = Math.max(0.3, Math.min(0.75, o.material.roughness || 0.7));
        o.material.metalness  = Math.max(0.1, o.material.metalness || 0.1);
        o.material.envMapIntensity = 0.8;
      }
      o.material.needsUpdate = true;
    }
    tractorMeshes.push(o);
  });

  scene.add(tractorMesh);
  glbReady = true;

}, undefined, err => {
  // GLB failed — reveal procedural geometry as fallback
  console.warn('GLB load failed, using procedural model:', err);
  proceduralMeshes.forEach(o => {
    o.material.colorWrite = true;
    o.material.depthWrite = true;
  });
  glbReady = true;
});

// ─── Highlight / isolate ────────────────────────────────────────────────────
const emStore = new Map();

function setEmit(grp,hex,intensity){
  // Drive the BoxHelper wireframe (primary visual indicator)
  const helper=grp.userData.boxHelper;
  if(helper){
    if(hex===null){
      helper.visible=false;
      helper.material.opacity=0;
    } else {
      helper.material.color.setHex(hex);
      helper.material.opacity=Math.min(0.95,intensity*1.8);
      helper.visible=true;
    }
  }
  // Also drive emissive on any procedural mesh that has it (bonus glow via bloom)
  grp.traverse(o=>{
    if(!o.isMesh||!o.material.emissive) return;
    if(!emStore.has(o)){
      emStore.set(o,{c:o.material.emissive.clone(),i:o.material.emissiveIntensity});
    }
    if(hex===null){
      const s=emStore.get(o);
      o.material.emissive.copy(s.c); o.material.emissiveIntensity=s.i;
    } else {
      o.material.emissive.setHex(hex); o.material.emissiveIntensity=intensity;
    }
  });
}

let selected=null, hovered=null, isolateMode=false;

function selectSys(key){
  const sameKey = parts.filter(p=>p.userData.partKey===key);
  // deselect previous
  if(selected) parts.filter(p=>p.userData.partKey===selected).forEach(p=>setEmit(p,null,0));
  selected=key;
  const branded=SYSTEMS[key].branded;
  sameKey.forEach(p=>setEmit(p, branded?0xc8943a:0xe8ebef, 0.45));
  document.querySelectorAll('.pr').forEach(r=>r.classList.toggle('sel',r.dataset.key===key));
  renderPanel(key);
  document.getElementById('infopanel').classList.add('vis');
  if(isolateMode) applyIsolate();
  flyTo(key);
}

function deselect(){
  if(selected) parts.filter(p=>p.userData.partKey===selected).forEach(p=>setEmit(p,null,0));
  selected=null;
  document.getElementById('infopanel').classList.remove('vis');
  document.querySelectorAll('.pr').forEach(r=>r.classList.remove('sel'));
  if(isolateMode){isolateMode=false;applyIsolate();}
}

function applyIsolate(){
  if(tractorMeshes.length){
    // Real model: fade to ghost in isolate mode, selected zone procedural becomes visible
    const isol=isolateMode&&!!selected;
    tractorMeshes.forEach(o=>{
      o.material.transparent=isol;
      o.material.opacity=isol?0.1:1-explAmt*0.84;
      o.material.depthWrite=!isol;
    });
    parts.forEach(p=>{
      const isSel=isolateMode&&selected&&p.userData.partKey===selected;
      p.traverse(o=>{
        if(!o.isMesh) return;
        // In isolate: show selected zone as solid procedural geometry
        o.material.colorWrite=isSel||(explAmt>0.05);
        o.material.depthWrite=isSel||(explAmt>0.05);
        if(isSel){ o.material.transparent=false; o.material.opacity=1; }
      });
    });
  } else {
    // Fallback: procedural-only mode
    parts.forEach(p=>{
      const keep=!isolateMode||!selected||p.userData.partKey===selected;
      p.traverse(o=>{
        if(!o.isMesh) return;
        o.material.transparent=!keep;
        o.material.opacity=keep?1:0.055;
        o.material.depthWrite=keep;
      });
    });
  }
}

// ─── Raycasting ──────────────────────────────────────────────────────────────
const ray=new THREE.Raycaster(), ptr=new THREE.Vector2();
function getPart(e){
  ptr.x=(e.clientX/W())*2-1; ptr.y=-(e.clientY/H())*2+1;
  ray.setFromCamera(ptr,camera);

  // Primary: hit real model → map to nearest zone center
  if(tractorMesh && explAmt < 0.25){
    const realHits=ray.intersectObject(tractorMesh,true);
    if(realHits.length>0){
      const hp=realHits[0].point;
      let nearest=null, nearDist=Infinity;
      parts.forEach(p=>{
        const d=hp.distanceTo(p.userData.homePos);
        if(d<nearDist){ nearDist=d; nearest=p; }
      });
      return nearest;
    }
  }

  // Fallback: procedural zone hit (works during explode + if GLB absent)
  const hits=ray.intersectObjects(parts,true);
  for(const h of hits){let o=h.object; while(o){if(o.userData.partKey)return o;o=o.parent;} }
  return null;
}

// ─── Hover pulse animation ────────────────────────────────────────────────────
let pulseT=0;

// ─── Render loop ──────────────────────────────────────────────────────────────
let fps=0,fpsF=0,fpsL=performance.now(),t0=performance.now();

function animate(){
  requestAnimationFrame(animate);
  const now=performance.now();
  const t=(now-t0)*0.001;
  pulseT=t;

  // smooth explode
  explAmt+=(explTgt-explAmt)*0.11;
  parts.forEach(p=>{
    p.position.copy(p.userData.homePos).add(
      p.userData.explodeDir.clone().multiplyScalar(explAmt)
    );
  });

  // GLB fades out as explode reveals procedural zones
  if(tractorMeshes.length){
    const tgtOp=1-explAmt*0.84;
    const needsT=tgtOp<0.99;
    tractorMeshes.forEach(o=>{
      if(Math.abs((o.material.opacity||1)-tgtOp)>0.005){
        o.material.transparent=needsT;
        o.material.opacity=tgtOp;
        o.material.depthWrite=!needsT;
      }
    });
  }
  // Show procedural geometry (with color) during explode
  if(proceduralMeshes.length){
    const showProc=explAmt>0.05;
    proceduralMeshes.forEach(o=>{
      if(o.material.colorWrite!==showProc){
        o.material.colorWrite=showProc;
        o.material.depthWrite=showProc;
      }
    });
  }

  // floor pulse rings
  ringPool.forEach(r=>{
    r.userData.phase+=0.006;
    const p2=((r.userData.phase%1)+1)%1;
    const sc=1+p2*7;
    r.scale.set(sc,sc,sc);
    r.material.opacity=0.18*(1-p2);
  });

  // hover emissive pulse on selected
  if(selected){
    const pulse=0.42+Math.sin(pulseT*3.5)*0.14;
    parts.filter(p=>p.userData.partKey===selected).forEach(p=>{
      // Pulse the BoxHelper opacity for futuristic "scanning" look
      if(p.userData.boxHelper){
        p.userData.boxHelper.material.opacity=pulse*0.9;
      }
      p.traverse(o=>{
        if(o.isMesh&&o.material.emissive&&o.material.emissiveIntensity>0){
          o.material.emissiveIntensity=pulse;
        }
      });
    });
  }

  // branded callout positions
  brandedKeys.forEach(k=>{
    const grp=parts.find(p=>p.userData.partKey===k); if(!grp) return;
    const wp=new THREE.Vector3(); grp.getWorldPosition(wp); wp.y+=1.0;
    const pr=wp.clone().project(camera);
    pinEls[k].style.left=((pr.x*.5+.5)*W())+'px';
    pinEls[k].style.top=((-pr.y*.5+.5)*H())+'px';
    pinEls[k].classList.toggle('on',pr.z<1&&pinsOn);
  });

  // label projection
  if(labelsOn){
    LBL_DATA.forEach(l=>{
      const grp=parts.find(p=>p.userData.partKey===l.key); if(!grp) return;
      const wp=new THREE.Vector3(); grp.getWorldPosition(wp); wp.add(l.off);
      const pr=wp.clone().project(camera);
      const el=lblEls[l.key];
      el.style.left=((pr.x*.5+.5)*W())+'px';
      el.style.top=((-pr.y*.5+.5)*H())+'px';
      el.style.opacity=pr.z<1?1:0;
    });
  }

  // camera fly-to
  if(camAnim){
    const ct=Math.min(1,(now-camT0)/CAM_DUR);
    const ek=ease(ct);
    camera.position.lerpVectors(camFromP,camToP,ek);
    controls.target.lerpVectors(camFromTgt,camToTgt,ek);
    if(ct>=1) camAnim=false;
  }

  controls.update();
  composer.render();   // uses bloom pass

  // FPS
  fpsF++;
  if(now-fpsL>500){
    fps=Math.round(fpsF*1000/(now-fpsL));
    document.getElementById('fpsc').textContent=fps+' fps';
    fpsF=0; fpsL=now;
  }
}

window.addEventListener('resize',()=>{
  camera.aspect=W()/H(); camera.updateProjectionMatrix();
  renderer.setSize(W(),H());
  composer.setSize(W(),H());
  bloom.resolution.set(W(),H());
});

// ─── Boot sequence ────────────────────────────────────────────────────────────
let ldPct=0;
const ldInt=setInterval(()=>{
  ldPct=Math.min(100,ldPct+6+Math.random()*14);
  document.getElementById('ldpct').textContent=Math.round(ldPct)+'%';
  if(ldPct>=100){
    clearInterval(ldInt);
    setTimeout(()=>{
      document.getElementById('loader').classList.add('done');
      // trigger scan animation
      setTimeout(()=>{ document.getElementById('scan').classList.add('go'); },200);
      // auto-showcase: explode + pins + select engine
      setTimeout(()=>{
        setExpl(1);
        setTimeout(()=>{
          pinsOn=true;
          selectSys('engine');
        },1400);
      },1600);
    },180);
  }
},75);

animate();
</script>
